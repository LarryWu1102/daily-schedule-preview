<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="larry wu 隔日行程預覽">
    <title>SCHEDULE PREVIEW — larry wu</title>
    <style>
        :root { color-scheme: light; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #f0ebe5;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            padding: 24px;
            color: #2c2c2c;
            line-height: 1.6;
            min-height: 100vh;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background-color: #ffffff;
            border: 2px solid #2c2c2c;
            border-radius: 4px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .header {
            background-color: #f0ebe5;
            padding: 32px 24px;
            border-bottom: 2px solid #2c2c2c;
        }
        .header h1 {
            font-size: 24px;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #2c2c2c;
            margin-bottom: 4px;
        }
        .header-subtitle {
            font-size: 13px;
            color: #666;
            letter-spacing: 1px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .section { border-bottom: 2px solid #2c2c2c; padding: 0; }
        .section:last-child { border-bottom: none; }
        .section-header {
            background-color: #2c2c2c;
            color: #ffffff;
            padding: 12px 24px;
            font-size: 14px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .section-tag {
            display: inline-block;
            background-color: #f0ebe5;
            color: #2c2c2c;
            padding: 4px 10px;
            border-radius: 2px;
            font-weight: 700;
            font-size: 12px;
        }
        .section-content {
            padding: 20px 24px;
            font-size: 13px;
            line-height: 1.8;
        }
        .empty-state {
            color: #999;
            font-style: italic;
            text-align: center;
            padding: 32px 24px;
        }
        .suggestion-list { list-style: none; }
        .suggestion-item {
            padding: 8px 0;
            padding-left: 24px;
            position: relative;
            font-size: 13px;
            line-height: 1.8;
            color: #333;
        }
        .suggestion-item::before {
            content: "→";
            position: absolute;
            left: 0;
            font-weight: 600;
        }
        .footer {
            background-color: #f0ebe5;
            padding: 16px 24px;
            border-top: 2px solid #2c2c2c;
            font-size: 12px;
            color: #666;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>SCHEDULE PREVIEW</h1>
            <div class="header-subtitle">
                <span>larry wu</span>
                <span id="currentDate"></span>
            </div>
        </div>

        <div class="section">
            <div class="section-header">
                <span class="section-tag">00</span>
                假日提醒
            </div>
            <div class="section-content">
                <p class="empty-state">檢查隔日假期及休假安排</p>
            </div>
        </div>

        <div class="section">
            <div class="section-header">
                <span class="section-tag">01</span>
                當日行程
            </div>
            <div class="section-content">
                <p class="empty-state">查詢 Outlook Calendar 中的行程</p>
            </div>
        </div>

        <div class="section">
            <div class="section-header">
                <span class="section-tag">02</span>
                同一參會人員群組
            </div>
            <div class="section-content">
                <p class="empty-state">分析參會人員重複搭配</p>
            </div>
        </div>

        <div class="section">
            <div class="section-header">
                <span class="section-tag">03</span>
                同一項目/主題
            </div>
            <div class="section-content">
                <p class="empty-state">追蹤相關專案會議</p>
            </div>
        </div>

        <div class="section">
            <div class="section-header">
                <span class="section-tag">04</span>
                時間相鄰/衝突分析
            </div>
            <div class="section-content">
                <p class="empty-state">識別會議密集時段</p>
            </div>
        </div>

        <div class="section">
            <div class="section-header">
                <span class="section-tag">05</span>
                建議與提醒
            </div>
            <div class="section-content">
                <ul class="suggestion-list">
                    <li class="suggestion-item">善用行程空檔規劃深度工作</li>
                    <li class="suggestion-item">確認重複會議的參與必要性</li>
                    <li class="suggestion-item">會議後 24 小時內完成跟進回覆</li>
                    <li class="suggestion-item">檢查近期假期規劃和時區跨越</li>
                </ul>
            </div>
        </div>

        <div class="footer">
            ⟳ 每日 17:00 自動更新 | 最後更新：<span id="lastUpdated"></span>
        </div>
    </div>

    <script>
        const tomorrow = new Date();
        tomorrow.setDate(tomorrow.getDate() + 1);
        const dateStr = tomorrow.toLocaleDateString('zh-TW', {
            year: 'numeric',
            month: '2-digit',
            day: '2-digit'
        });
        document.getElementById('currentDate').textContent = dateStr.replace(/\//g, ' · ');
        document.getElementById('lastUpdated').textContent = new Date().toLocaleTimeString('zh-TW');
    </script>
</body>
</html>
